server:
  port: 8089

spring:
  application:
    name: reward-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reward-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.payment_wallet.reward_service.entity.Transaction
        spring.kafka.consumer.properties.spring.json.use.type.headers: false
        spring.kafka.consumer.properties.spring.json.value.default.type: com.payment_wallet.reward_service.entity.Transaction
