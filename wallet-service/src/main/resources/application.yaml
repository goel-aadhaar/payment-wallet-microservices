server:
  port: 8083

spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:h2:mem:walletdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

wallet:
  hold:
    expiry:
      scan-rate-ms: 60000
