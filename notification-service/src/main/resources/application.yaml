server:
  port: 8084

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:h2:mem:notificationdb
    driver-class-name: ord.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  kafka:
     bootstrap-servers: localhost:9092
     consumer:
       group-d: notification-group
       auto-offset-reset: earliest
       key-deserialization: org.apache.kafka.common.serialization.StringDeserializer
       value-deserialization: org.apache.kafka.common.serialization.JsonDeserializer
       properties:
         spring.json.trusted.packages: "com.payment_wallet.notification_service.entity"
         spring.json.value.default.type: com.payment_wallet.notification_service.enitiy.Transaction